<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                height: 100vh;
                display: flex;
                flex-direction: column;
                background: #f8f8f7;
                overflow: hidden;
            }

            #agent-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            #loading {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                color: #6b6b68;
                font-size: 12px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            .spinner {
                width: 20px;
                height: 20px;
                border: 2px solid #e0ddd8;
                border-top-color: #2d5be3;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            #status-bar {
                padding: 4px 12px;
                font-size: 11px;
                color: #6b6b68;
                background: #f0ede8;
                border-top: 1px solid #e8e6e0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                flex-shrink: 0;
                min-height: 22px;
            }
        </style>

        <script src="https://unpkg.com/amazon-quicksight-embedding-sdk@2.11.3/dist/quicksight-embedding-js-sdk.min.js"></script>
    </head>
    <body>
        <div id="agent-container">
            <div id="loading">
                <div class="spinner"></div>
                <span>Loading agent…</span>
            </div>
        </div>

        <div id="status-bar"></div>

        <script>
            // ─────────────────────────────────────────────────────────────────
            // AGENT URL MAP
            // Add new agents here as key: url pairs
            // ─────────────────────────────────────────────────────────────────
            const AGENTS = {
                "patient-summary":
                    "https://ap-southeast-2.quicksight.aws.amazon.com/sn/account/Pinnacle/embed/share/accounts/651526146208/chatagents/e630b277-ea3f-4b56-a2fc-c7f338e3b337",
                "ccr-claims":
                    "https://ap-southeast-2.quicksight.aws.amazon.com/sn/account/Pinnacle/embed/share/accounts/651526146208/chatagents/cf6e1c37-f890-4195-9301-6d2c1738bb86",
            };

            const ALLOWED_ORIGINS = [
                "https://custom-chrome-extension.github.io",
            ];

            // ─────────────────────────────────────────────────────────────────
            // STATE
            // ─────────────────────────────────────────────────────────────────
            let chatAgent = null;
            let pendingPrompt = null;
            let currentAgentType = "patient-summary";

            // ─────────────────────────────────────────────────────────────────
            // HELPERS
            // ─────────────────────────────────────────────────────────────────
            function setStatus(msg) {
                document.getElementById("status-bar").textContent = msg;
            }

            function showLoading(msg = "Loading agent…") {
                // Clear any existing agent UI and show spinner
                const container = document.getElementById("agent-container");
                container.innerHTML = `
				<div id="loading">
				<div class="spinner"></div>
				<span>${msg}</span>
				</div>`;
            }

            // ─────────────────────────────────────────────────────────────────
            // INIT / REINIT AGENT
            // ─────────────────────────────────────────────────────────────────
            async function initAgent(agentType = "patient-summary") {
                const url = AGENTS[agentType];

                if (!url) {
                    setStatus(`Unknown agent type: ${agentType}`);
                    return;
                }

				// Reset pending prompt and destroy previos chat agent
                pendingPrompt = null;

                if (chatAgent) {
                    try {
                        chatAgent = null;
                    } catch (e) {
                        console.warn(
                            "[Bridge] Could not destroy previous agent:",
                            e,
                        );
                    }
                }

                showLoading(`Loading ${agentType} agent…`);
                setStatus(`Initialising ${agentType} agent…`);

                try {
                    const embeddingContext =
                        await QuickSightEmbedding.createEmbeddingContext();

                    // Clear loading spinner — SDK will mount into the container
                    document.getElementById("agent-container").innerHTML = "";

                    chatAgent = await embeddingContext.embedQuickChat(
                        {
                            url: url,
                            container:
                                document.getElementById("agent-container"),
                            width: "100%",
                            height: "100%",
                        },
                        {
                            onMessage: async (messageEvent) => {
                                console.log(
                                    "[Bridge] Agent event:",
                                    messageEvent.eventName,
                                );
                            },
                        },
                    );

                    setStatus("Agent ready");

                    // Send any queued prompt that arrived during init
                    if (pendingPrompt) {
                        setStatus("Sending patient data…");
                        await chatAgent.send({ text: pendingPrompt });
                        pendingPrompt = null;
                        setStatus("Analysis sent — waiting for response…");
                    }
                } catch (err) {
                    setStatus("Error loading agent: " + err.message);
                    console.error("[Bridge] SDK init error:", err);
                    document.getElementById("agent-container").innerHTML =
                        '<p style="color:#c0392b;font-size:12px;padding:16px;text-align:center">SDK failed to load. Check console for details.</p>';
                }
            }

            // ─────────────────────────────────────────────────────────────────
            // MESSAGE LISTENER
            // ─────────────────────────────────────────────────────────────────
            window.addEventListener("message", async (event) => {
                const isAllowed =
                    ALLOWED_ORIGINS.some((o) => event.origin === o) ||
                    event.origin.startsWith("chrome-extension://");

                if (!isAllowed) {
                    console.warn(
                        "[Bridge] Blocked message from unknown origin:",
                        event.origin,
                    );
                    return;
                }

                // ── Switch agent ──────────────────────────────────────────────
                if (event.data?.type === "SET_AGENT") {
                    const newType = event.data.agentType;

                    // Only reinit if actually switching to a different agent
                    if (newType !== currentAgentType) {
                        currentAgentType = newType;
                        await initAgent(currentAgentType);
                    }
                }

                // ── Send prompt to agent ──────────────────────────────────────
                else if (event.data?.type === "SEND_TO_AGENT") {
                    const prompt = event.data.prompt;
                    if (!prompt) return;

                    if (chatAgent) {
                        setStatus("Sending patient data to agent…");
                        try {
                            await chatAgent.send({ text: prompt });
                            setStatus("Analysis sent — waiting for response…");
                        } catch (err) {
                            setStatus("Error sending to agent: " + err.message);
                            console.error("[Bridge] send error:", err);
                        }
                    } else {
                        // Queue it — agent still initialising
                        pendingPrompt = prompt;
                        setStatus("Queued — waiting for agent to initialise…");
                    }
                }
            });

            // ─────────────────────────────────────────────────────────────────
            // START — load default agent
            // ─────────────────────────────────────────────────────────────────
            initAgent(currentAgentType);
        </script>
    </body>
</html>
