<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            iframe {
                flex: 1;
                border: none;
                width: 100%;
                display: block;
            }

            /* Loading state shown before iframe fires load */
            #loading {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                background: #f8f8f7;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 12px;
                color: #6b6b68;
                pointer-events: none;
            }

            .spinner {
                width: 18px;
                height: 18px;
                border: 2px solid #e0ddd8;
                border-top-color: #2d5be3;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div id="loading">
            <div class="spinner"></div>
            <span>Loading agent…</span>
        </div>

        <script>
            // ─────────────────────────────────────────────────────────────────
            // AGENT URL MAP
            // Add new agents here as key: url pairs
            // ─────────────────────────────────────────────────────────────────
            const AGENTS = {
                "patient-summary":
                    "https://ap-southeast-2.quicksight.aws.amazon.com/sn/account/Pinnacle/embed/share/accounts/651526146208/chatagents/e630b277-ea3f-4b56-a2fc-c7f338e3b337",
                "ccr-claims":
                    "https://ap-southeast-2.quicksight.aws.amazon.com/sn/account/Pinnacle/embed/share/accounts/651526146208/chatagents/cf6e1c37-f890-4195-9301-6d2c1738bb86",
            };

            const ALLOWED_ORIGINS = [
                "https://custom-chrome-extension.github.io",
            ];

            let currentAgent = "patient-summary";
            let iframe = null;

            // ── Create iframe with given URL ──────────────────────────────────
            function loadAgent(agentType) {
                const url = AGENTS[agentType];
                if (!url) return;

                // Remove existing iframe if switching agents
                if (iframe) iframe.remove();

                iframe = document.createElement("iframe");
                iframe.src = url;
                iframe.allow = "clipboard-read; clipboard-write";

                iframe.addEventListener("load", () => {
                    // Hide loading spinner once iframe fires load
                    document.getElementById("loading").style.display = "none";
                });

                document.body.appendChild(iframe);
            }

            // ── Listen for messages from extension sidebar ────────────────────
            window.addEventListener("message", (event) => {
                const isAllowed =
                    ALLOWED_ORIGINS.some((o) => event.origin === o) ||
                    event.origin.startsWith("chrome-extension://");

                if (!isAllowed) {
                    console.warn(
                        "[Bridge] Blocked message from unknown origin:",
                        event.origin,
                    );
                    return;
                }

                // Switch to a different agent
                if (event.data?.type === "SET_AGENT") {
                    const newType = event.data.agentType;
                    if (newType !== currentAgent && AGENTS[newType]) {
                        currentAgent = newType;
                        document.getElementById("loading").style.display =
                            "flex";
                        loadAgent(currentAgent);
                    }
                }
            });

            // ── Load default agent on startup ─────────────────────────────────
            loadAgent(currentAgent);
        </script>
    </body>
</html>
